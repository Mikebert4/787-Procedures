<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>787 NP Training Aide</title>
    <link rel="stylesheet" href="styles.css?v=20260720-callouts-fix">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Boeing 787 FCOM + FCTM</p>
          <h1>787 Procedures Training Aide</h1>
          <nav class="mode-switch" aria-label="Procedure section">
            <button id="mode-normal" type="button" class="mode-button" aria-pressed="true">Normal</button>
            <button id="mode-non-normal" type="button" class="mode-button" aria-pressed="false">Non-Normal</button>
            <button id="mode-memory" type="button" class="mode-button" aria-pressed="false">Memory items</button>
            <button id="mode-limitations" type="button" class="mode-button" aria-pressed="false">Limitations</button>
            <button id="mode-callouts" type="button" class="mode-button" aria-pressed="false">Callouts</button>
            <button id="mode-scan-flows" type="button" class="mode-button" aria-pressed="false">Scan Flows</button>
          </nav>
        </div>
        <div class="status-panel" aria-live="polite">
          <span id="stage-counter">Stage 1 of 20</span>
          <strong id="stage-progress">0%</strong>
        </div>
      </header>

      <main class="layout">
        <aside class="stage-nav" aria-label="Procedure stages">
          <div class="nav-header">
            <span>Profile</span>
            <div class="nav-actions">
              <button id="reset-all" type="button" class="ghost-button">Reset</button>
              <button id="nav-toggle" type="button" class="icon-button nav-toggle" aria-expanded="true" aria-label="Collapse stage menu">Collapse</button>
            </div>
          </div>
          <div id="tabs" class="tabs" role="tablist" aria-orientation="vertical"></div>
        </aside>

        <section class="stage-view" aria-labelledby="stage-title">
          <div class="stage-toolbar">
            <button id="prev-stage" type="button" class="icon-button" aria-label="Previous stage">Prev</button>
            <button id="next-stage" type="button" class="icon-button primary">Next</button>
          </div>
          <div class="stage-header">
            <p id="stage-label" class="eyebrow">Stage</p>
            <h2 id="stage-title"></h2>
            <p id="stage-citation" class="citation"></p>
            <div id="fctm-stage-links" class="fctm-stage-links" aria-label="Reference notes for this stage"></div>
          </div>
          <div id="stage-content" class="procedure-content"></div>
        </section>

        <aside class="visual-pane" aria-label="Reference visuals">
          <h2>Reference</h2>
          <div id="visuals"></div>
        </aside>
      </main>
    </div>

    <dialog id="fctm-dialog" class="fctm-dialog" aria-labelledby="fctm-dialog-title">
      <div class="fctm-dialog-panel">
        <div class="fctm-dialog-head">
          <div>
            <p id="fctm-dialog-source" class="eyebrow">Reference Note</p>
            <h2 id="fctm-dialog-title">Training note</h2>
          </div>
          <button id="fctm-close" type="button" class="icon-button" aria-label="Close FCTM guidance">Close</button>
        </div>
        <div id="fctm-dialog-content" class="fctm-dialog-content"></div>
      </div>
    </dialog>

    <dialog id="image-dialog" class="image-dialog" aria-labelledby="image-dialog-title">
      <div class="image-dialog-panel">
        <div class="image-dialog-head">
          <div>
            <p class="eyebrow">Reference Image</p>
            <h2 id="image-dialog-title">Expanded view</h2>
          </div>
          <button id="image-close" type="button" class="icon-button" aria-label="Close expanded image">Close</button>
        </div>
        <div class="image-dialog-body">
          <img id="image-dialog-img" alt="">
          <p id="image-dialog-caption" class="citation"></p>
        </div>
      </div>
    </dialog>

    <script src="source-data.js?v=20260720-scan-flows"></script>
    <script src="non-normal-data.js?v=20260720-scan-flows"></script>
    <script src="memory-items.js?v=20260720-scan-flows"></script>
    <script src="limitations-data.js?v=20260720-scan-flows"></script>
    <script src="callouts-data.js?v=20260720-scan-flows"></script>
    <script src="scan-flows-data.js?v=20260720-scan-flows"></script>
    <script src="fctm-guidance.js?v=20260720-scan-flows"></script>
    <script src="norse-differences.js?v=20260720-scan-flows"></script>
    <script src="app.js?v=20260720-scan-flows"></script>
  </body>
</html>
